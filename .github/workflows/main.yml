name: Update Gold Prices Workflow

on:
  schedule:
    - cron: '*/30 * * * *'  # التحديث التلقائي الداخلي كل 30 دقيقة
  workflow_dispatch:      # زر التشغيل اليدوي من الموقع
  repository_dispatch:    # الاستجابة لموقع cron-job.org
    types: [manual_trigger]

jobs:
  update_data:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Update Script
        run: python update_gold_prices.py

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "Auto-update prices: $(date)" || echo "No changes to commit"
          git push
